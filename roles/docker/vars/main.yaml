---
# Переменные для Debian/Ubuntu
debian_docker_repo_url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}"
debian_docker_gpg_url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"

# Переменные для Oracle Linux (использует репозиторий CentOS/RHEL от Docker)
redhat_docker_repo_url: "https://download.docker.com/linux/centos"
redhat_docker_gpg_url: "https://download.docker.com/linux/centos/gpg"

# Список пользователей, которых нужно добавить в группу docker (опционально)
docker_users: [] 
# Пример: docker_users: ['ansible', 'root']